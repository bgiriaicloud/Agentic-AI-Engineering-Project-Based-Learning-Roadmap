apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-inference-app-deployment
  labels:
    app: ai-inference-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-inference-app
  template:
    metadata:
      labels:
        app: ai-inference-app
    spec:
      containers:
      - name: inference-container
        image: ai-inference-app:latest
        imagePullPolicy: Never  # Pull from local Minikube docker repository
        ports:
        - containerPort: 8000
        # Resource requests & limits for stability
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        # Health checks (probes)
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
